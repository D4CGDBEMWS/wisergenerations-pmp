<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f8fb"/>
      <stop offset="100%" stop-color="#e7eef4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <radialGradient id="btnTop" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2f80b4"/>
      <stop offset="55%" stop-color="#1a6c9c"/>
      <stop offset="100%" stop-color="#13567f"/>
    </radialGradient>
    <linearGradient id="btnSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#114e74"/>
      <stop offset="100%" stop-color="#0d3f5e"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67986e" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#67986e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#67986e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67986e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#67986e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#67986e" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1f3a5f" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="btnShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#13567f" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.7" filter="url(#soft)">
    <rect x="120" y="150" width="360" height="3" fill="url(#streak)" transform="rotate(-14 300 151)"/>
    <rect x="720" y="140" width="400" height="3" fill="url(#streak)" transform="rotate(12 920 141)"/>
    <rect x="90" y="470" width="480" height="3" fill="url(#streak)" transform="rotate(-8 330 471)"/>
    <rect x="650" y="500" width="500" height="3" fill="url(#streak)" transform="rotate(9 900 501)"/>
  </g>

  <g fill="#67986e">
    <path d="M427 170 l26 16 -26 16 z"/>
    <path d="M745 170 l26 16 -26 16 z"/>
  </g>

  <!-- CARD 1: LEARN -->
  <g filter="url(#cardShadow)">
    <rect x="120" y="70" width="230" height="205" rx="16" fill="url(#card)" stroke="#d6e2ea" stroke-width="1.5"/>
    <rect x="120" y="70" width="230" height="5" rx="2.5" fill="#166497"/>
  </g>
  <g transform="translate(235,150)" fill="none" stroke="#166497" stroke-width="6" stroke-linejoin="round">
    <rect x="-46" y="-34" width="92" height="62" rx="6"/>
    <path d="M-30 40 H30" stroke-linecap="round"/>
  </g>
  <path d="M223 138 l24 13 -24 13 z" fill="#67986e"/>
  <text x="240" y="232" text-anchor="middle" fill="#143a5a" font-size="22" font-weight="700" letter-spacing="1">LEARN</text>
  <text x="240" y="256" text-anchor="middle" fill="#5a7384" font-size="13" letter-spacing="1.5">MENTOR-LED COHORTS</text>

  <!-- CARD 2: PRACTICE -->
  <g filter="url(#cardShadow)">
    <rect x="470" y="70" width="230" height="205" rx="16" fill="url(#card)" stroke="#d6e2ea" stroke-width="1.5"/>
    <rect x="470" y="70" width="230" height="5" rx="2.5" fill="#166497"/>
  </g>
  <g transform="translate(585,148)" fill="none" stroke="#166497" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-40" y="-40" width="80" height="80" rx="8"/>
    <path d="M-24 -16 l10 10 18 -20"/>
    <path d="M-24 18 H22" stroke="#67986e"/>
  </g>
  <text x="585" y="232" text-anchor="middle" fill="#143a5a" font-size="22" font-weight="700" letter-spacing="1">PRACTICE</text>
  <text x="585" y="256" text-anchor="middle" fill="#5a7384" font-size="13" letter-spacing="1.5">694-QUESTION BANK</text>

  <!-- CARD 3: PASS -->
  <g filter="url(#cardShadow)">
    <rect x="820" y="70" width="230" height="205" rx="16" fill="url(#card)" stroke="#d6e2ea" stroke-width="1.5"/>
    <rect x="820" y="70" width="230" height="5" rx="2.5" fill="#166497"/>
  </g>
  <g transform="translate(935,142)">
    <rect x="-44" y="-36" width="88" height="58" rx="6" fill="none" stroke="#166497" stroke-width="6"/>
    <path d="M-30 -18 H18 M-30 -4 H10" stroke="#8aa0b0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="20" cy="26" r="15" fill="none" stroke="#67986e" stroke-width="6"/>
    <path d="M12 38 l-6 22 14 -10 14 10 -6 -22" fill="#67986e"/>
  </g>
  <text x="935" y="232" text-anchor="middle" fill="#143a5a" font-size="22" font-weight="700" letter-spacing="1">CERTIFIED</text>
  <text x="935" y="256" text-anchor="middle" fill="#5a7384" font-size="13" letter-spacing="1.5">PMP® EARNED</text>

  <g stroke="#67986e" stroke-width="5" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M470 420 L350 300"/>
    <path d="M600 430 L600 300"/>
    <path d="M730 420 L850 300"/>
  </g>
  <g fill="#67986e">
    <path d="M350 300 l-3 20 16 -10 z"/>
    <path d="M600 300 l-9 18 18 0 z"/>
    <path d="M850 300 l-13 14 16 6 z"/>
  </g>

  <ellipse cx="600" cy="470" rx="330" ry="115" fill="url(#halo)" filter="url(#glow)"/>
  <ellipse cx="600" cy="503" rx="250" ry="76" fill="#dbe6ee"/>
  <ellipse cx="600" cy="503" rx="250" ry="76" fill="none" stroke="#67986e" stroke-width="3" opacity="0.65"/>
  <g filter="url(#btnShadow)">
    <path d="M380 470 a220 66 0 0 0 440 0 v32 a220 66 0 0 1 -440 0 z" fill="url(#btnSide)"/>
    <ellipse cx="600" cy="470" rx="220" ry="66" fill="url(#btnTop)"/>
  </g>
  <ellipse cx="600" cy="470" rx="220" ry="66" fill="none" stroke="#4f97c0" stroke-width="2" opacity="0.5"/>
  <ellipse cx="600" cy="452" rx="150" ry="28" fill="#ffffff" opacity="0.14"/>
  <text x="600" y="462" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="800" letter-spacing="1">GET</text>
  <text x="600" y="496" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="800" letter-spacing="1">JOB-READY</text>
</svg>
